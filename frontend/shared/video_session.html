<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Session - PeerTutoria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#2196F3;
    --secondary:#FF4081;
    --bg:#eef3ff;
    --white:#fff;
    --radius:14px;
    --shadow:0 4px 12px rgba(0,0,0,0.15);
}
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:var(--bg);
    height:100vh;
    display:flex;
    flex-direction:column;
}
.header {
    background:var(--white);
    padding:12px 20px;
    box-shadow:var(--shadow);
}
.header h3 {
    margin:0;
    color:var(--primary);
}
.video-container {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
}
.video-box {
    width:45%;
    height:300px;
    background:black;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}
.controls {
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background:var(--white);
    box-shadow:0 -3px 10px rgba(0,0,0,0.08);
}
.controls button {
    padding:10px 16px;
    border:none;
    border-radius:var(--radius);
    cursor:pointer;
    font-size:14px;
}
.mute-btn { background:#ffc107; }
.cam-btn { background:#03a9f4; color:white; }
.leave-btn { background:#e53935; color:white; }
</style>

<script src="../config.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body>

<div class="header">
    <h3>Video Session</h3>
    <div id="sessionTimer">00:00</div>
</div>

<div class="video-container">

<div class="video-box">
    <video id="localVideo" autoplay muted playsinline></video>
    <div style="text-align:center;font-size:13px;">You</div>
</div>

<div class="video-box">
    <video id="remoteVideo" autoplay playsinline></video>
    <div style="text-align:center;font-size:13px;">Peer</div>
</div>

</div>

<div class="controls">
    <button id="muteBtn" class="mute-btn" onclick="toggleMute()">🎤 Mute</button>
    <button id="camBtn" class="cam-btn" onclick="toggleCamera()">🎥 Camera Off</button>
    <button class="leave-btn" onclick="endSession()">End Session</button>
</div>

<script>
/* ================= SESSION DATA ================= */
const user = JSON.parse(localStorage.getItem("currentUser"));
const sessionId = localStorage.getItem("currentSessionId");

if (!user || !sessionId) {
    alert("No active session");
    window.location.href = "../index.html";
}

/* ================= SOCKET ================= */
const socket = io(BASE_URL);
socket.emit("joinSession", {
    sessionId,
    userId: user.id,
    role: user.role
});
/* ================= LOAD SESSION TIMER ================= */

function loadSessionTimer(retries = 5) {
    fetch(`${BASE_URL}/api/sessions/${sessionId}`)
        .then(res => res.json())
        .then(session => {
            if (session.started_at) {
                startTimer(session.started_at);
            } else if (retries > 0) {
                setTimeout(() => loadSessionTimer(retries - 1), 1000);
            } else {
                console.warn("Session start time unavailable.");
            }
        })
        .catch(err => console.error("Timer error:", err));
}

loadSessionTimer();
/* ================= WEBRTC STATE ================= */
let localStream;
let peerConnection;
let started = false;
let pendingCandidates = [];

const pcConfig = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }, // ⭐ important
        { urls: "stun:stun.relay.metered.ca:80" },
        {
            urls: [
                "turn:global.relay.metered.ca:80",
                "turn:global.relay.metered.ca:80?transport=tcp",
                "turn:global.relay.metered.ca:443",
                "turns:global.relay.metered.ca:443?transport=tcp"
            ],
            username: "0c8d2d4e7cbb18f3d18e47b3",
            credential: "O2z0s6dFmh5hxHVq"
        }
    ]
};

/* ================= PEER CONNECTION ================= */
function createPeerConnection() {
    peerConnection = new RTCPeerConnection(pcConfig);

    peerConnection.ontrack = (event) => {
    console.log("Remote track received:", event);

    const remoteVideo = document.getElementById("remoteVideo");

    if (!remoteVideo.srcObject) {
        remoteVideo.srcObject = new MediaStream();
    }

    event.streams[0].getTracks().forEach(track => {
        remoteVideo.srcObject.addTrack(track);
    });
};

peerConnection.oniceconnectionstatechange = () => {
    console.log("ICE State:", peerConnection.iceConnectionState);
};

peerConnection.onicegatheringstatechange = () => {
    console.log("ICE Gathering State:", peerConnection.iceGatheringState);
};

peerConnection.onsignalingstatechange = () => {
    console.log("Signaling State:", peerConnection.signalingState);
};

    peerConnection.onicecandidate = event => {
    if (event.candidate) {
        console.log("Sending ICE Candidate:", event.candidate);
        socket.emit("iceCandidate", {
            sessionId,
            candidate: event.candidate
        });
    }
};

    peerConnection.onconnectionstatechange = () => {
        console.log("Connection state:", peerConnection.connectionState);
        if (peerConnection.connectionState === "failed") {
    console.log("Reconnecting...");
    started = false;
    startVideo();
}
    };
}

/* ================= START VIDEO ================= */
async function startVideo() {
    if (started) return;
    started = true;
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
if (peerConnection) {
    peerConnection.close();
}
    try {
    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });
} catch (err) {
    alert("Camera or microphone access denied.");
    console.error(err);
    return;
}

    document.getElementById("localVideo").srcObject = localStream;

    createPeerConnection();

    localStream.getTracks().forEach(track =>
        peerConnection.addTrack(track, localStream)
    );

    // 🔥 Only ONE side creates offer (stable)
    if (user.role === "student") {
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit("videoOffer", { sessionId, offer });
    }
}

/* ================= SIGNALING ================= */
socket.on("videoOffer", async ({ offer }) => {
    if (!peerConnection) createPeerConnection();

    await peerConnection.setRemoteDescription(offer);

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit("videoAnswer", { sessionId, answer });

    // 🔥 Apply buffered ICE
    for (const candidate of pendingCandidates) {
    try {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (err) {
        console.error("Buffered ICE failed:", err);
    }
}
pendingCandidates = [];
});

socket.on("videoAnswer", async ({ answer }) => {
    await peerConnection.setRemoteDescription(answer);

    // 🔥 Apply buffered ICE
    for (const candidate of pendingCandidates) {
    try {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (err) {
        console.error("Buffered ICE failed:", err);
    }
}
pendingCandidates = [];
});

socket.on("iceCandidate", async ({ candidate }) => {
    console.log("Received ICE Candidate:", candidate);

    if (!peerConnection) {
        pendingCandidates.push(candidate);
        return;
    }

    try {
        await peerConnection.addIceCandidate(
            new RTCIceCandidate(candidate)
        );
    } catch (err) {
        console.error("ICE Candidate Error:", err);
    }
});

/* ================= CONTROLS ================= */
function toggleMute() {
    if (!localStream) return;

    const audioTrack = localStream.getAudioTracks()[0];
    audioTrack.enabled = !audioTrack.enabled;

    const btn = document.getElementById("muteBtn");

    if (audioTrack.enabled) {
        btn.innerText = "🎤 Mute";
    } else {
        btn.innerText = "🔇 Unmute";
    }
}

function toggleCamera() {
    if (!localStream) return;

    const videoTrack = localStream.getVideoTracks()[0];
    videoTrack.enabled = !videoTrack.enabled;

    const btn = document.getElementById("camBtn");

    if (videoTrack.enabled) {
        btn.innerText = "🎥 Camera Off";
    } else {
        btn.innerText = "📷 Camera On";
    }
}

/* ================= END SESSION ================= */
function endSession() {
    fetch(`${BASE_URL}/api/sessions/${sessionId}/complete`, {
        method: "PUT"
    }).catch(() => {});

    socket.emit("endSession", sessionId);
}

socket.on("sessionEnded", () => {
    localStorage.setItem("lastCompletedSession", sessionId);
    localStorage.removeItem("currentSessionId");

    if (user.role === "student") {
        // Go to rating page instead of dashboard
        window.location.href = "../student/rate_tutor.html";
    } else {
        window.location.href = "../peer/session_summary.html";
    }
});
/* ================= SESSION TIMER ================= */

let timerInterval;

function startTimer(startTime) {
    const start = new Date(startTime).getTime();
    if (isNaN(start)) return;

    if (timerInterval) {
        clearInterval(timerInterval);
    }

    function update() {
        const diff = Date.now() - start;
        const minutes = Math.floor(diff / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        document.getElementById("sessionTimer").innerText =
            `${minutes}:${seconds.toString().padStart(2, "0")}`;
    }

    update();
    timerInterval = setInterval(update, 1000);
}
/* ================= START ================= */
socket.on("readyForCall", () => {
    console.log("Both users ready. Starting video...");
    startVideo();
});
</script>

</body>
</html>
