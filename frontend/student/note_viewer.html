<!DOCTYPE html>
<html>
<head>
<title>View Note - PeerTutoria</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f1f6ff;
}

.viewer-container {
    height:100vh;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

/* Disable right click */
body {
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="viewer-container">
    <iframe id="pdfFrame"></iframe>
</div>

<script src="../config.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const noteId = params.get("noteId");
const justPurchased = params.get("purchased");
const user = JSON.parse(localStorage.getItem("currentUser"));

/* ---------- BASIC VALIDATION ---------- */

if(!user){
    window.location.href="../index.html";
}

if(!noteId){
    alert("Invalid note");
    window.location.href="student_notes_market.html";
}

/* ---------- CHECK PURCHASE ACCESS ---------- */

async function checkAccess(){

    let res = await fetch(`${BASE_URL}/api/notes/check-purchase/${noteId}/${user.id}`);
    let data = await res.json();

    if(!data.purchased && justPurchased){

        // wait a moment for DB insert after payment
        await new Promise(r => setTimeout(r,800));

        res = await fetch(`${BASE_URL}/api/notes/check-purchase/${noteId}/${user.id}`);
        data = await res.json();
    }

    if(!data.purchased){
        alert("Purchase required");
        window.location.href="student_notes_market.html";
        return false;
    }

    return true;
}

/* ---------- LOAD NOTE ---------- */

async function loadNote(){

    const res = await fetch(`${BASE_URL}/api/notes/view/${noteId}/${user.id}`);
    const data = await res.json();

    if(data.error){
        alert(data.error);
        window.location.href="student_notes_market.html";
        return;
    }

    let fileUrl = data.fileUrl;

    if (!fileUrl.startsWith("http")) {
        fileUrl = BASE_URL + fileUrl;
    }

    document.getElementById("pdfFrame").src =
        "https://docs.google.com/gview?embedded=true&url=" + encodeURIComponent(fileUrl) + "&nocache=1";
}

/* ---------- INITIALIZE ---------- */

async function init(){

    const allowed = await checkAccess();

    if(allowed){
        await loadNote();
    }

}

init();

</script>

</body>
</html>
