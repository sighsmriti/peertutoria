<!DOCTYPE html>
<html>
<head>
<title>View Note - PeerTutoria</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f1f6ff;
}

.viewer-container {
    height:100vh;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

/* Disable right click */
body {
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="viewer-container">
    <iframe id="pdfFrame"></iframe>
</div>

<script src="../config.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const noteId = params.get("noteId");
const user = JSON.parse(localStorage.getItem("currentUser"));

if(!user) window.location.href="../index.html";

async function loadNote(){
    const res = await fetch(`${BASE_URL}/api/notes/view/${noteId}/${user.id}`);
    const data = await res.json();

    if(data.error){
        alert(data.error);
        window.location.href="student_notes_market.html";
        return;
    }

    // 🔥 Correct Line (with toolbar hidden)
    let fileUrl = data.fileUrl;

if (!fileUrl.startsWith("http")) {
    fileUrl = BASE_URL + fileUrl;   // old /uploads fallback
}

document.getElementById("pdfFrame").src = fileUrl + "#toolbar=0";
}

loadNote();
</script>

</body>
</html>
