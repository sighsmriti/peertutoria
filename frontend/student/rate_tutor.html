<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rate Tutor</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

textarea {
    width: 100%;
    margin-top: 12px;
    padding: 8px;
}

button {
    margin-top: 15px;
    padding: 10px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1976D2;
}

.stars {
    font-size: 30px;
    margin-top: 15px;
    cursor: pointer;
}

.stars span {
    color: #ccc;
    transition: 0.2s;
}
</style>
</head>

<body>

<div class="card">
    <h2>Rate Your Tutor</h2>
    <div id="sessionDuration" style="margin-bottom:12px;color:#555;font-weight:500;">
Session Duration: loading...
</div>
    <!-- ⭐ STAR RATING -->
    <div id="starContainer" class="stars">
        <span data-value="1">☆</span>
        <span data-value="2">☆</span>
        <span data-value="3">☆</span>
        <span data-value="4">☆</span>
        <span data-value="5">☆</span>
    </div>

    <input type="hidden" id="rating" />

    <textarea id="review" placeholder="Optional review"></textarea>

    <button onclick="submitRating()">Submit</button>
</div>

<!-- CONFIG -->
<script src="../config.js"></script>

<script>
/* ---------- AUTH + SESSION CHECK ---------- */
const user = JSON.parse(localStorage.getItem("currentUser"));
const sessionId = localStorage.getItem("lastCompletedSession");

if (!user || !sessionId) {
    alert("Invalid access");
    window.location.href = "student_dashboard.html";
}

/* ---------- FETCH SESSION TO GET TUTOR ---------- */
let tutorId = null;

fetch(`${BASE_URL}/api/sessions/${sessionId}`)
    .then(res => res.json())
    .then(session => {

        tutorId = session.tutor_id;

        /* -------- SESSION DURATION -------- */

        if(session.started_at && session.completed_at){

            const start = new Date(session.started_at);
            const end = new Date(session.completed_at);

            const minutes = Math.floor((end - start) / 60000);

            document.getElementById("sessionDuration").innerText =
                `Session Duration: ${minutes} minutes`;

        }

    })
    .catch(() => {
        alert("Failed to load session");
        window.location.href = "student_dashboard.html";
    });

/* ---------- STAR LOGIC ---------- */
const stars = document.querySelectorAll("#starContainer span");
const ratingInput = document.getElementById("rating");

// Click to select
stars.forEach(star => {
    star.addEventListener("click", () => {
        const value = star.getAttribute("data-value");
        ratingInput.value = value;

        stars.forEach(s => {
            s.textContent = s.getAttribute("data-value") <= value ? "★" : "☆";
        });
    });

    // Hover preview
    star.addEventListener("mouseover", () => {
        const value = star.getAttribute("data-value");

        stars.forEach(s => {
            s.textContent = s.getAttribute("data-value") <= value ? "★" : "☆";
        });
    });

    // Restore after hover
    star.addEventListener("mouseout", () => {
        const currentRating = ratingInput.value;

        stars.forEach(s => {
            s.textContent = s.getAttribute("data-value") <= currentRating ? "★" : "☆";
        });
    });
});

/* ---------- SUBMIT RATING ---------- */
function submitRating() {
    const rating = ratingInput.value;
    const review = document.getElementById("review").value;

    if (!rating) {
        alert("Please select a rating");
        return;
    }

    if (!tutorId) {
        alert("Session still loading. Please wait.");
        return;
    }

    fetch(`${BASE_URL}/api/ratings`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            sessionId,
            tutorId,
            studentId: user.id,
            rating,
            review
        })
    })
    .then(res => res.json())
    .then(() => {
        // Clean up storage
        localStorage.removeItem("lastCompletedSession");
        localStorage.removeItem("lastSessionDuration");

        alert("Thanks for your feedback!");
        window.location.href = "student_dashboard.html";
    })
    .catch(() => {
        alert("Rating submission failed");
    });
}
</script>

</body>
</html>
