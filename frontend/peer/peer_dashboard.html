<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard - PeerTutoria</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2196F3;
            --secondary: #FF4081;
            --bg: #f1f6ff;
            --white: white;
            --radius: 14px;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: Poppins, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: var(--white);
            padding: 18px 40px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            color: var(--primary);
        }

        .navbar a {
            margin-left: 18px;
            text-decoration: none;
            color: #333;
        }

        /* PAGE */
        .container {
            padding: 30px 50px;
        }

        /* WELCOME CARD */
        .welcome-box {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 25px;
            border-radius: var(--radius);
            color: white;
            margin-bottom: 30px;
        }

        /* QUICK ACTIONS */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            font-weight: 500;
        }

        .link-card:hover {
            transform: translateY(-4px);
        }

        /* SECTION TITLE */
        .section-title {
            font-size: 22px;
            font-weight: 600;
            margin: 30px 0 15px;
        }

        /* REQUESTS, SESSIONS */
        .card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>PeerTutoria</h2>
        <div>
            <a href="peer_dashboard.html" style="font-weight:600; color:var(--secondary);">Home</a>
            <a href="../shared/profile.html">Profile</a>
            <a href="../shared/notifications.html">Notifications</a>
            <a href="../shared/settings.html">Settings</a>
        </div>
    </div>

    <div class="container">

        <!-- WELCOME BOX -->
        <div class="welcome-box">
            <h1>Welcome, Tutor!</h1>
            <p>Manage your sessions, students, and materials all in one place.</p>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="section-title">Quick Actions</div>

        <div class="quick-links">
            <div class="link-card" onclick="window.location.href='manage_requests.html'">
                📩 Manage Requests </div>
            <div class="link-card" onclick="window.location.href='upload_notes.html'">
    📘 Upload Notes
</div>

            <div class="link-card"onclick="window.location.href='peer_earnings.html'">📈 Earnings Dashboard</div>
            <div class="link-card" onclick="window.location.href='reviews_dashboard.html'">⭐ Ratings</div>
        </div>

        <!-- REQUESTS PREVIEW -->
        <div class="section-title">New Session Requests</div>

        <div class="card" style="text-align:center; padding:30px;">
            <p>Check "Manage Requests" to see pending student requests.</p>
            <button onclick="window.location.href='manage_requests.html'"
                style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:var(--radius); cursor:pointer;">
                Go to Requests
            </button>
        </div>

    </div>
    <script src="../config.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem("currentUser"));

        if (!user) {
            alert("Please login first");
            window.location.href = "../index.html";
        }
    </script>

</body>

</html>
